name: Daily `bot` run

on:
  schedule:
    - cron: '00 00 * * *'
  workflow_dispatch:
  push:
    branches: [main]
    paths: ['bot/**', 'pyproject.toml']
  pull_request:
    paths: ['bot/**', 'pyproject.toml']

permissions:
  contents: write

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install dependencies
        run: |
          pip install poetry
          poetry install --with dev
      - run: poetry run ruff check bot/
      - run: poetry run black --check bot/
      - run: poetry run pytest bot/tests/ -v

  daily-bot-run:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    needs: lint-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install poetry
          poetry install
      - name: Run bot
        run: poetry run python -m bot
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: ${{ vars.ANTHROPIC_MODEL || 'claude-haiku-4-5-20251001' }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      - name: Configure git
        run: |
          git config --global user.name "fmesqg-auto"
          git config --global user.email "fmesqg-auto@users.noreply.github.com"
      - name: Commit and push if there are changes
        run: |
          if [ $(git ls-files -o --exclude-standard | wc -l) -gt 0 ] || [[ $(git diff --name-only | wc -l) -gt 0 ]]
          then
            git add .
            git commit -m "Daily bot update"
            git push origin main
            echo "Wrote update."
          else
            echo "Nothing to write."
          fi
